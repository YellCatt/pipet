name: Build and Release Nim (Multi-platform + 极路由2)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

permissions:
  contents: write

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: hiwifi2
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: 'Debug: 列出仓库目录结构'
        shell: bash
        if: matrix.target != 'windows'
        run: |
          echo "=== 当前工作目录 ==="
          pwd
          echo ""
          echo "=== 项目根目录文件列表 ==="
          ls -la
          echo ""
          echo "=== src 目录 ==="
          if [ -d src ]; then find src -type f; else echo "src 目录不存在"; fi
          echo ""
          echo "=== .nimble 文件内容 ==="
          cat pipet.nimble
          echo ""

      - name: 'Debug: 列出仓库目录结构'
        shell: pwsh
        if: matrix.target == 'windows'
        run: |
          Write-Host "=== 当前工作目录 ==="
          Get-Location
          Write-Host ""
          Write-Host "=== 项目根目录文件列表 ==="
          Get-ChildItem
          Write-Host ""
          Write-Host "=== src 目录 ==="
          if (Test-Path src) { Get-ChildItem src -Recurse } else { Write-Host "src 目录不存在" }
          Write-Host ""
          Write-Host "=== .nimble 文件内容 ==="
          Get-Content pipet.nimble
          Write-Host ""

      - name: Setup Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.0.0'
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Debug: 检查 Nim 和 Nimble 版本'
        shell: bash
        if: matrix.target != 'windows'
        run: |
          echo "=== Nim 版本 ==="
          nim --version
          echo ""
          echo "=== Nimble 版本 ==="
          nimble --version
          echo ""
          echo "=== PATH 环境变量 ==="
          echo $PATH | tr ':' '\n'
          echo ""

      - name: 'Debug: 检查 Nim 和 Nimble 版本'
        shell: pwsh
        if: matrix.target == 'windows'
        run: |
          Write-Host "=== Nim 版本 ==="
          nim --version
          Write-Host ""
          Write-Host "=== Nimble 版本 ==="
          nimble --version
          Write-Host ""
          Write-Host "=== PATH 环境变量 ==="
          $env:PATH -split ';'
          Write-Host ""

      - name: Cache Nimble packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nimble
          key: ${{ runner.os }}-nimble-v2-${{ hashFiles('**/*.nimble', '**/*.nim') }}
          restore-keys: |
            ${{ runner.os }}-nimble-v2-

      - name: Nimble install dependencies
        shell: bash
        if: matrix.target == 'linux' || matrix.target == 'macos' || matrix.target == 'hiwifi2'
        run: |
          echo "=== 执行 nimble install -y ==="
          nimble install -y
          echo ""
          echo "=== 安装后目录 ==="
          ls -la

      - name: Nimble install dependencies
        shell: pwsh
        if: matrix.target == 'windows'
        run: |
          Write-Host "=== 执行 nimble install -y ==="
          nimble install -y
          Write-Host ""
          Write-Host "=== 安装后目录 ==="
          Get-ChildItem

      - name: Build (Linux)
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -e
          echo "=== 执行 nimble build -d:release --verbose (全静态) ==="
          nimble build \
            -d:release \
            --passC:-static \
            --passL:-static \
            --dynlibOverride:pcre \
            --dynlibOverride:ssl \
            --dynlibOverride:crypto \
            --verbose
          echo ""
          echo "=== 构建后根目录 ==="
          ls -la
          echo ""
          echo "=== dist 目录 ==="
          if [ -d dist ]; then find dist -type f; else echo "dist 目录不存在"; fi
          echo ""
          echo "=== bin 目录 ==="
          if [ -d bin ]; then find bin -type f; else echo "bin 目录不存在"; fi
          echo ""

      - name: Package artifact (Linux)
        if: matrix.target == 'linux'
        shell: bash
        run: |
          set -e
          echo "=== 寻找 pipet 二进制 ==="
          if [ -f dist/pipet/pipet ]; then
            echo "找到: dist/pipet/pipet"
            cp dist/pipet/pipet ./pipet-linux
          elif [ -f bin/pipet ]; then
            echo "找到: bin/pipet"
            cp bin/pipet ./pipet-linux
          elif [ -f pipet ]; then
            echo "找到: ./pipet"
            cp pipet ./pipet-linux
          else
            echo "ERROR: 没有找到 pipet 二进制"
            echo "尝试路径:"
            echo "  - dist/pipet/pipet"
            echo "  - bin/pipet"
            echo "  - ./pipet"
            echo ""
            echo "=== 搜索所有可执行文件 ==="
            find . -type f -executable -name "pipet*" 2>/dev/null
            exit 1
          fi
          echo ""
          echo "=== 文件信息 ==="
          file pipet-linux
          ls -lh pipet-linux
          echo ""
          echo "=== 创建压缩包 ==="
          tar czvf pipet-linux.tar.gz pipet-linux
          ls -lh pipet-linux.tar.gz

      - name: Build (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Write-Host "=== 执行 nimble build -d:release (全静态) ==="
          nimble build -d:release --dynlibOverride:pcre --dynlibOverride:ssl --dynlibOverride:crypto --verbose
          Write-Host ""
          Write-Host "=== 构建退出码: $LASTEXITCODE ==="
          Write-Host ""
          Write-Host "=== 构建后根目录 ==="
          Get-ChildItem
          Write-Host ""
          Write-Host "=== dist 目录 ==="
          if (Test-Path dist) { Get-ChildItem dist -Recurse } else { Write-Host "dist 目录不存在" }
          Write-Host ""
          Write-Host "=== bin 目录 ==="
          if (Test-Path bin) { Get-ChildItem bin -Recurse } else { Write-Host "bin 目录不存在" }

      - name: Package artifact (Windows)
        if: matrix.target == 'windows'
        shell: pwsh
        run: |
          Write-Host "=== 寻找 pipet.exe ==="
          $srcPath = ".\dist\pipet\pipet.exe"
          $altPath1 = ".\pipet.exe"
          $altPath2 = ".\bin\pipet.exe"

          $foundPath = $null
          if (Test-Path $srcPath) { $foundPath = $srcPath }
          elseif (Test-Path $altPath1) { $foundPath = $altPath1 }
          elseif (Test-Path $altPath2) { $foundPath = $altPath2 }

          if ($foundPath) {
            Write-Host "找到: $foundPath"
            Copy-Item -Path $foundPath -Destination ".\pipet-windows.exe"
            Write-Host ""
            Write-Host "=== 文件信息 ==="
            Get-Item pipet-windows.exe | Format-List
            Write-Host ""
            Write-Host "=== 创建压缩包 ==="
            Compress-Archive -Path .\pipet-windows.exe -DestinationPath pipet-windows.zip -Force
            Write-Host "=== 压缩包信息 ==="
            Get-Item pipet-windows.zip | Format-List
          } else {
            Write-Host "ERROR: 没有找到 pipet.exe"
            Write-Host "尝试路径:"
            Write-Host "  - $srcPath"
            Write-Host "  - $altPath1"
            Write-Host "  - $altPath2"
            Write-Host ""
            Write-Host "=== 搜索所有 exe ==="
            Get-ChildItem -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Build (macOS)
        if: matrix.target == 'macos'
        shell: bash
        run: |
          set -e
          echo "=== 执行 nimble build -d:release (全静态) ==="
          nimble build \
            -d:release \
            --dynlibOverride:pcre \
            --dynlibOverride:ssl \
            --dynlibOverride:crypto \
            --verbose
          echo ""
          echo "=== 构建后根目录 ==="
          ls -la
          echo ""
          echo "=== dist 目录 ==="
          if [ -d dist ]; then find dist -type f; else echo "dist 目录不存在"; fi
          echo ""
          echo "=== bin 目录 ==="
          if [ -d bin ]; then find bin -type f; else echo "bin 目录不存在"; fi

      - name: Package artifact (macOS)
        if: matrix.target == 'macos'
        shell: bash
        run: |
          set -e
          echo "=== 寻找 pipet 二进制 ==="
          if [ -f dist/pipet/pipet ]; then
            echo "找到: dist/pipet/pipet"
            cp dist/pipet/pipet ./pipet-macos
          elif [ -f bin/pipet ]; then
            echo "找到: bin/pipet"
            cp bin/pipet ./pipet-macos
          elif [ -f pipet ]; then
            echo "找到: ./pipet"
            cp pipet ./pipet-macos
          else
            echo "ERROR: 没有找到 pipet 二进制"
            echo "尝试路径:"
            echo "  - dist/pipet/pipet"
            echo "  - bin/pipet"
            echo "  - ./pipet"
            echo ""
            echo "=== 搜索所有可执行文件 ==="
            find . -type f -executable -name "pipet*" 2>/dev/null
            exit 1
          fi
          echo ""
          echo "=== 文件信息 ==="
          file pipet-macos
          ls -lh pipet-macos
          echo ""
          echo "=== 创建压缩包 ==="
          tar czvf pipet-macos.tar.gz pipet-macos
          ls -lh pipet-macos.tar.gz

      - name: Install OpenWrt SDK (mt7620)
        if: matrix.target == 'hiwifi2'
        shell: bash
        run: |
          set -e
          echo "=== 更新 apt ==="
          sudo apt-get update
          echo ""
          echo "=== 安装工具 ==="
          sudo apt-get install -y xz-utils wget
          echo ""
          echo "=== 下载 OpenWrt SDK ==="
          wget -q https://downloads.openwrt.org/releases/23.05.3/targets/ramips/mt7620/openwrt-sdk-23.05.3-ramips-mt7620_gcc-12.3.0_musl.Linux-x86_64.tar.xz
          echo ""
          echo "=== 解压 SDK ==="
          mkdir -p openwrt-sdk
          tar xf openwrt-sdk-*.tar.xz -C openwrt-sdk --strip-components=1
          TOOLCHAIN_DIR=$(find openwrt-sdk/staging_dir -name "toolchain-*" -type d | head -1)
          echo "工具链目录: $PWD/$TOOLCHAIN_DIR"
          echo "$PWD/$TOOLCHAIN_DIR/bin" >> $GITHUB_PATH
          echo "STAGING_DIR=$PWD/openwrt-sdk/staging_dir" >> $GITHUB_ENV
          echo ""
          echo "=== 检查交叉编译器 ==="
          ls "$PWD/$TOOLCHAIN_DIR/bin/" | head -20
          which mipsel-openwrt-linux-musl-gcc || echo "mipsel-openwrt-linux-musl-gcc 不在 PATH（下一步重新读取）"

      - name: Build (极路由2 - 静态链接)
        if: matrix.target == 'hiwifi2'
        shell: bash
        run: |
          set -e

          echo "=== 重新确认交叉编译器 ==="
          which mipsel-openwrt-linux-musl-gcc
          echo ""

          export CC=mipsel-openwrt-linux-musl-gcc
          export CXX=mipsel-openwrt-linux-musl-g++

          echo "=== 执行 nimble build（交叉编译） ==="
          nimble build \
            --cpu:mipsel \
            --os:linux \
            --cc:gcc \
            --gcc.exe:mipsel-openwrt-linux-musl-gcc \
            --gcc.linkerexe:mipsel-openwrt-linux-musl-gcc \
            --passC:-O2 \
            --passC:-EL \
            --passC:-msoft-float \
            --passC:-static \
            --passL:-static \
            --passL:-lpthread \
            --passL:-ldl \
            -d:release \
            --mm:arc \
            --threads:off \
            -y
          echo ""
          echo "=== 构建后根目录 ==="
          ls -la
          echo ""
          echo "=== dist 目录 ==="
          if [ -d dist ]; then find dist -type f; else echo "dist 目录不存在"; fi
          echo ""
          echo "=== bin 目录 ==="
          if [ -d bin ]; then find bin -type f; else echo "bin 目录不存在"; fi
          echo ""
          echo "=== 搜索 pipet* 文件 ==="
          find . -name "pipet*" -type f 2>/dev/null

      - name: Package artifact (极路由2)
        if: matrix.target == 'hiwifi2'
        shell: bash
        run: |
          set -e
          echo "=== 寻找 pipet 二进制 ==="
          if [ -f bin/pipet ]; then
            echo "找到: bin/pipet"
            cp bin/pipet ./pipet-hiwifi2
          elif [ -f dist/pipet/pipet ]; then
            echo "找到: dist/pipet/pipet"
            cp dist/pipet/pipet ./pipet-hiwifi2
          elif [ -f pipet ]; then
            echo "找到: ./pipet"
            cp pipet ./pipet-hiwifi2
          else
            echo "ERROR: 没有找到 pipet 二进制"
            echo "尝试路径:"
            echo "  - bin/pipet"
            echo "  - dist/pipet/pipet"
            echo "  - ./pipet"
            echo ""
            echo "=== 搜索所有可执行文件 ==="
            find . -type f -executable -name "pipet*" 2>/dev/null
            exit 1
          fi
          echo ""
          echo "=== 文件信息 ==="
          file pipet-hiwifi2
          ls -lh pipet-hiwifi2
          echo ""
          echo "=== 创建压缩包 ==="
          tar czvf pipet-hiwifi2.tar.gz pipet-hiwifi2
          ls -lh pipet-hiwifi2.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipet-${{ matrix.target }}
          path: |
            pipet-*.tar.gz
            pipet-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(date +%Y%m%d-%H%M%S)"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "多平台自动构建（含极路由2 - 静态链接）" \
            artifacts/*